<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#121212" />
    <title>YoVibe Offline</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #121212;
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 480px;
        background: #1d1d1d;
        border: 1px solid #2b2b2b;
        border-radius: 14px;
        padding: 32px 24px;
        text-align: center;
      }
      .icon {
        font-size: 64px;
        margin-bottom: 16px;
        display: block;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 22px;
        color: #ffffff;
      }
      p {
        margin: 0;
        color: #b3b3b3;
        line-height: 1.55;
      }
      .btn {
        display: inline-block;
        margin-top: 24px;
        padding: 12px 32px;
        background: #2196F3;
        color: #ffffff;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.2s;
      }
      .btn:hover {
        background: #1976D2;
      }
      .btn:active {
        background: #1565C0;
      }
      .info {
        margin-top: 20px;
        font-size: 12px;
        color: #666666;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="icon">📡</span>
      <h1>You are offline</h1>
      <p>YoVibe cannot load this page right now. Please reconnect to the internet and try again.</p>
      <button class="btn" onclick="location.reload()">
        Retry
      </button>
      <p class="info">
        Previously viewed pages may still be available offline.
      </p>
    </main>
  </body>
</html>
